body:
  text: 枝銘唯曰惡危危於忿戾惡失道失道於嗜欲惡相忘相忘於貴富王問於師尚父曰不知黃帝顓頊堯舜之道存乎意抑幾喪不可得而睹乎師尚父曰在丹書王女欲觀之盍齊齋乎將以書見武王齊齋三日端服帽逾堂階南面而立師尚父曰夫先王之書不與北面武王西面而行曲折而南東面而立師尚父奉書道書之言曰怠勝義則喪義勝怠則長義勝欲則從欲勝義則凶仁以得之仁以守之其運百世不仁以得之仁以守之其運十世不仁以得之不仁以守之及於身武王聞之恐懼為銘於席之四端曰安樂必戒右端曰毋行可悔席後左端曰民之反側亦不可不志後右端曰諫殷鑒不遠視而所代為機曰惶惶惟謹口口生敬口生詬慎之口鑒銘曰見其前必慮其後盥銘曰與其溺於人寧溺於淵溺於淵猶可遊溺於人不可救桯銘曰毋曰何可傷禍將長毋曰惡害禍將大毋曰何可殘禍將然牖銘唯曰位難得而易失士難得而易外無謹弗志曰余知之毋武王問於太公望曰亦有不盈於十言而百世不失之道有之乎太公望答曰有武王曰其道可得以聞乎太公望答曰身則君之臣道則聖人之道君齋將道之君不祈則弗道武王齋七日太公望奉丹書以朝太公南面武王北面而復問太公答曰丹書之言有之曰志勝欲則利欲勝志則喪志勝欲則從欲志則凶
